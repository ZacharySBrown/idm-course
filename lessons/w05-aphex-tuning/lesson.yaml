- id: gd-disk-02
  kind: gear_deep_dive
  heading: What's under the lid — the annotated mechanism
  body_md: slides/gd-disk-02-panel.md
  gear_annotations:
  - src: assets/gear-disklavier-interior.jpg
    caption: "Cutaway of a Disklavier MkIV showing solenoid bank, pedal solenoids, and MIDI I/O."
    callouts:
    - label: "solenoid bank"
      note: "88 solenoids, one per key. Plunger seats with an audible metallic click at end of travel."
    - label: "pedal solenoids"
      note: "Three — sustain, sostenuto, soft. Loudest mechanical noise in the instrument."
    - label: "MIDI DIN / USB"
      note: "Accepts standard SMF + XG-extended. Velocity 1–127 maps to solenoid drive current."
    - label: "body cavity mic position"
      note: "Aphex placed condensers under the lid, not above the soundboard. Captures click + body woof."
  audio_examples: []
- id: gd-disk-03
  kind: gear_deep_dive
  heading: The Drukqs technique — solenoid click as rhythmic layer

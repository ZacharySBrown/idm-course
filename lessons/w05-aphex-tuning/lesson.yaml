- id: t01
  kind: concept
  heading: The cents number line — what you're actually counting
  body_md: slides/t01-cents-number-line.md
  visuals:
  - type: svg
    caption: "Hz/cent number line for E minor — root E1, fifth B1, minor third G1, with JI vs 12-TET positions marked."
    svg_content: |
      <svg viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cents number line E minor">
        <rect width="800" height="220" fill="#0f1115"/>
        <line x1="40" y1="120" x2="760" y2="120" stroke="#d0d6df" stroke-width="2"/>
        <g font-family="monospace" font-size="12" fill="#d0d6df">
          <line x1="40" y1="110" x2="40" y2="130" stroke="#d0d6df"/>
          <text x="40" y="155" text-anchor="middle">0¢</text>
          <text x="40" y="95" text-anchor="middle">E1 41.20 Hz</text>
          <line x1="220" y1="110" x2="220" y2="130" stroke="#d0d6df"/>
          <text x="220" y="155" text-anchor="middle">300¢</text>
          <text x="220" y="95" text-anchor="middle">G1 (12-TET)</text>
          <line x1="204" y1="105" x2="204" y2="135" stroke="#e66a3b" stroke-width="2"/>
          <text x="204" y="180" text-anchor="middle" fill="#e66a3b">315.64¢ JI 6:5</text>
          <line x1="460" y1="110" x2="460" y2="130" stroke="#d0d6df"/>
          <text x="460" y="155" text-anchor="middle">700¢</text>
          <text x="460" y="95" text-anchor="middle">B1 (12-TET)</text>
          <line x1="461" y1="105" x2="461" y2="135" stroke="#5fb38b" stroke-width="2"/>
          <text x="461" y="200" text-anchor="middle" fill="#5fb38b">701.96¢ JI 3:2</text>
          <line x1="760" y1="110" x2="760" y2="130" stroke="#d0d6df"/>
          <text x="760" y="155" text-anchor="middle">1200¢ (E2)</text>
        </g>
      </svg>
  audio_examples: []
- id: t02
  kind: concept
  heading: 12-EDO, 19-EDO, 17-EDO — the equal-division grid
  body_md: slides/t02-edo-visual.md
  visuals:
  - type: mermaid
    caption: "EDO comparison — how three equal divisions carve the 1200-cent octave."
    mermaid: |
      graph TD
        A[1200 cent octave] --> B[12-EDO<br/>100¢ step<br/>piano default]
        A --> C[19-EDO<br/>63.16¢ step<br/>cleaner JI thirds]
        A --> D[17-EDO<br/>70.59¢ step<br/>sharp fifths]
        A --> E[24-EDO<br/>50¢ step<br/>quarter-tones]
  audio_examples: []
- id: t03
  kind: concept
  heading: Just intonation vs equal temperament — the ratio war
  body_md: slides/t03-ji-vs-et.md
  visuals:
  - type: svg
    caption: "JI vs 12-TET side-by-side — circle of fifths in both systems, showing cumulative error."
    svg_content: |
      <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JI vs ET circle of fifths">
        <rect width="800" height="400" fill="#0f1115"/>
        <g font-family="monospace" font-size="11" fill="#d0d6df">
          <circle cx="200" cy="200" r="140" fill="none" stroke="#5fb38b" stroke-width="2"/>
          <text x="200" y="40" text-anchor="middle" fill="#5fb38b" font-size="14">Just Intonation 3:2</text>
          <text x="200" y="380" text-anchor="middle" fill="#5fb38b">does not close — Pythagorean comma +23.46¢</text>
          <circle cx="600" cy="200" r="140" fill="none" stroke="#d0d6df" stroke-width="2"/>
          <text x="600" y="40" text-anchor="middle" font-size="14">12-TET (fifth = 700¢)</text>
          <text x="600" y="380" text-anchor="middle">closes cleanly — every fifth 1.96¢ flat</text>
        </g>
      </svg>
  audio_examples: []
- id: t04
  kind: concept
  heading: The Pythagorean comma — why the piano lies
  body_md: slides/t04-pythagorean-comma.md
  visuals:
  - type: svg
    caption: "Stacking twelve pure 3:2 fifths overshoots the octave by 23.46 cents — the Pythagorean comma."
    svg_content: |
      <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pythagorean comma">
        <rect width="800" height="300" fill="#0f1115"/>
        <g font-family="monospace" font-size="11" fill="#d0d6df">
          <text x="400" y="30" text-anchor="middle" font-size="14" fill="#d0d6df">Twelve pure 3:2 fifths, stacked from C</text>
          <line x1="40" y1="150" x2="720" y2="150" stroke="#5fb38b" stroke-width="2"/>
          <line x1="720" y1="150" x2="760" y2="150" stroke="#e66a3b" stroke-width="4"/>
          <text x="40" y="180" text-anchor="middle">C</text>
          <text x="720" y="180" text-anchor="middle">expected C</text>
          <text x="760" y="180" text-anchor="middle">actual</text>
          <text x="740" y="220" text-anchor="middle" fill="#e66a3b">+23.46¢</text>
          <text x="400" y="270" text-anchor="middle">(3/2)^12 = 129.746  vs  2^7 = 128.000  →  ratio 1.01364 = 23.46¢</text>
        </g>
      </svg>
  audio_examples: []

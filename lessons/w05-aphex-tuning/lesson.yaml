- id: gd-mnlg-02
  kind: gear_deep_dive
  heading: The five controls that matter on the Monologue panel
  body_md: slides/gd-mnlg-02-panel.md
  gear_annotations:
  - src: assets/gear-mnlg-panel.jpg
    caption: "Front panel callouts — microtuning-specific controls only."
    callouts:
    - label: "EDIT MODE"
      note: "Hold + program dial → parameter 17 is Microtuning. Selects 12-TET, ET user 1–6, scale user 1–6."
    - label: "PROGRAM dial"
      note: "Doubles as parameter-picker in EDIT MODE. This is the gate to the microtuning edit page."
    - label: "key group / 25 keys"
      note: "Each key carries its own ±75 cent offset. Twelve offsets per user scale."
    - label: "SLIDE TIME"
      note: "Per-patch portamento time. Short slide + microtuning = Aphex lead texture."
    - label: "sequencer STEP mode"
      note: "Per-step pitch + motion sequencing. One step: scale degree. Next step: +15¢ via motion."
  audio_examples: []
- id: gd-mnlg-03
  kind: gear_deep_dive
  heading: How Aphex programs a microtuning, step by zero
  body_md: slides/gd-mnlg-03-technique.md
  visuals: []
  audio_examples: []
- id: gd-mnlg-04
  kind: gear_deep_dive
  heading: The algorithm — cent math inside the Monologue's MCU
  body_md: slides/gd-mnlg-04-algorithm.md
  diagrams:
  - mermaid: |
      graph LR
        A[MIDI note N] --> B[base CV<br/>12-TET lookup]
        B --> C[add scale offset<br/>±75¢]
        C --> D[add motion-seq offset<br/>±75¢]
        D --> E[16-bit pitch resolution<br/>1¢ user-facing offsets]
        E --> F[VCO 1 + VCO 2]
    caption: "MIDI-to-CV dispatch inside the Monologue. The microtuning layer is a lookup-table insert between note-in and voltage-out."
  audio_examples: []

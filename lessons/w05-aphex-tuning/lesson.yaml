  visuals: []
  audio_examples: []
  song_refs:
  - song:aphex_avril_14th
- id: gd-disk-04
  kind: gear_deep_dive
  heading: The algorithm — velocity-to-solenoid and why the click is velocity-dependent
  body_md: slides/gd-disk-04-algorithm.md
  diagrams:
  - mermaid: |
      graph TD
        A[MIDI note V velocity] --> B[lookup: solenoid current I=f V]
        A --> C[lookup: pull duration T=g V]
        B --> D[plunger accelerates]
        C --> D
        D --> E[key-bottom thump]
        D --> F[solenoid seating click]
        D --> G[hammer strikes string]
        G --> H[string resonance<br/>Helmholtz f=1/2L·√ T over μ]
        G --> I[body cavity woof ~70 Hz]
    caption: "Three independent acoustic signals from one MIDI note: the click, the string, the body cavity. Mic placement chooses the mix."
  audio_examples: []
- id: gd-disk-05
  kind: gear_deep_dive
  heading: The Ableton bridge — Collision, piano VST, parallel click bus
  body_md: slides/gd-disk-05-ableton-bridge.md
  diagrams:
  - mermaid: |
      graph LR
        A[MIDI clip] --> B[Piano VST<br/>Noire / Grand Piano]
        A --> C[Collision<br/>Mallet + Plate, Decay 200ms]
        C --> D[Return B<br/>HPF 600 Hz + Glue]
        A --> E[Drum Rack<br/>70 Hz body-cavity kick]
        B --> F[Master]
        D --> F
        E --> F
    caption: "Three-way parallel bus recreating the Drukqs under-lid miking: string tone, solenoid click, body cavity woof."
  audio_examples: []

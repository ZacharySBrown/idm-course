# Technical diagrams ---------------------------------------------------------
- id: d01
  kind: concept
  heading: "Beat-switch timing — bar-count visualization"
  body_md: slides/d01-beat-switch-timing.md
  diagrams:
  - svg_content: |
      <svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" aria-label="Beat-switch timing candidate bar positions on a 32-bar loop">
        <rect x="0" y="0" width="800" height="260" fill="#f6f4ef"/>
        <line x1="40" y1="180" x2="760" y2="180" stroke="#222" stroke-width="1.5"/>
        <text x="40" y="200" font-family="monospace" font-size="10" fill="#222">bar 1</text>
        <text x="200" y="200" font-family="monospace" font-size="10" fill="#222">bar 8</text>
        <text x="380" y="200" font-family="monospace" font-size="10" fill="#222">bar 16</text>
        <text x="560" y="200" font-family="monospace" font-size="10" fill="#222">bar 24</text>
        <text x="720" y="200" font-family="monospace" font-size="10" fill="#222">bar 32</text>
        <g font-family="monospace" font-size="10" fill="#222">
          <line x1="40" y1="175" x2="40" y2="185" stroke="#222"/>
          <line x1="220" y1="175" x2="220" y2="185" stroke="#222"/>
          <line x1="400" y1="175" x2="400" y2="185" stroke="#222"/>
          <line x1="580" y1="175" x2="580" y2="185" stroke="#222"/>
          <line x1="760" y1="175" x2="760" y2="185" stroke="#222"/>
        </g>
        <!-- candidate switch markers -->
        <line x1="220" y1="60" x2="220" y2="175" stroke="#c04a2a" stroke-width="2" stroke-dasharray="4 3"/>
        <text x="170" y="52" font-family="monospace" font-size="11" fill="#c04a2a">bar 8 — punctuation</text>
        <line x1="400" y1="80" x2="400" y2="175" stroke="#c04a2a" stroke-width="2" stroke-dasharray="4 3"/>
        <text x="350" y="72" font-family="monospace" font-size="11" fill="#c04a2a">bar 16 — bridge</text>
        <line x1="760" y1="100" x2="760" y2="175" stroke="#c04a2a" stroke-width="2" stroke-dasharray="4 3"/>
        <text x="680" y="92" font-family="monospace" font-size="11" fill="#c04a2a">bar 33 — new section</text>
        <!-- non-candidates -->
        <line x1="320" y1="130" x2="320" y2="175" stroke="#999" stroke-width="1" stroke-dasharray="2 3"/>
        <text x="275" y="124" font-family="monospace" font-size="10" fill="#999">bar 11 — reads as mistake</text>
        <text x="40" y="240" font-family="monospace" font-size="11" fill="#3a7a4a">Power-of-two bar boundaries only. TDE rule.</text>
      </svg>
    caption: "Three valid switch points on a 32-bar loop. Bar 11 shown as a counter-example."
  references:
  - bib:pitchfork_dj_dahi_money_trees
  - bib:whosampled_db

- id: d02
  kind: concept
  heading: "Inverse drop — energy curve vs normal drop"
  body_md: slides/d02-inverse-drop-curve.md
  diagrams:
  - svg_content: |
      <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" aria-label="Energy curve comparison between a normal EDM drop and an inverse drop">
        <rect x="0" y="0" width="800" height="300" fill="#f6f4ef"/>
        <line x1="60" y1="250" x2="760" y2="250" stroke="#222" stroke-width="1.5"/>
        <line x1="60" y1="40" x2="60" y2="250" stroke="#222" stroke-width="1.5"/>
        <text x="20" y="50" font-family="monospace" font-size="11" fill="#222">energy</text>
        <text x="720" y="268" font-family="monospace" font-size="11" fill="#222">time</text>
        <!-- bar markers -->
        <g font-family="monospace" font-size="10" fill="#222">
          <text x="120" y="268">bar 0</text>
          <text x="280" y="268">bar 8</text>
          <text x="420" y="268">bar 16 (drop)</text>
          <text x="620" y="268">bar 24</text>
        </g>
        <line x1="440" y1="40" x2="440" y2="250" stroke="#999" stroke-width="1" stroke-dasharray="2 3"/>
        <!-- normal drop curve (red) -->
        <path d="M 60 230 L 200 210 L 340 150 L 440 60 L 620 70 L 760 80"
              fill="none" stroke="#c04a2a" stroke-width="2.5"/>
        <text x="620" y="60" font-family="monospace" font-size="11" fill="#c04a2a">normal drop</text>
        <!-- inverse drop curve (grey) -->
        <path d="M 60 230 L 200 210 L 340 150 L 440 100 L 460 200 L 620 190 L 760 195"
              fill="none" stroke="#444" stroke-width="2.5"/>
        <text x="620" y="185" font-family="monospace" font-size="11" fill="#444">inverse drop</text>
        <!-- annotation -->
        <text x="340" y="105" font-family="monospace" font-size="10" fill="#c04a2a">peak = more</text>
        <text x="450" y="225" font-family="monospace" font-size="10" fill="#444">peak = absence</text>
      </svg>
    caption: "Same time axis, same peak bar. Red: rhythmic density spikes. Grey: rhythmic density collapses; textural density takes over."
  references:
  - bib:burial_soundforge_quote

- id: d03
  kind: concept
  heading: "Chain Selector routing — MIDI in, one stereo out"
  body_md: slides/d03-chain-selector-routing.md
  diagrams:
  - mermaid: |
      graph LR
        M[MIDI in] --> S{Chain Selector<br/>value 0-127}
        S -->|zone 0-42| A[Chain A<br/>clean saw sub]
        S -->|zone 43-85| B[Chain B<br/>FM growl]
        S -->|zone 86-127| C[Chain C<br/>bit-crushed square]
        A --> O[Rack audio out]
        B --> O
        C --> O
    caption: "Active chain(s) determined by selector value. Hard zones = one chain at a time; overlapping zones crossfade."
  references:
  - bib:ableton_live_12_manual

- id: d04
  kind: concept
  heading: "The rub — two modes, shared pivot, non-shared friction"
  body_md: slides/d04-the-rub-diagram.md
  diagrams:
  - svg_content: |
      <svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" aria-label="Two scales showing shared and non-shared pitch classes between sample and bassline">
        <rect x="0" y="0" width="800" height="260" fill="#f6f4ef"/>
        <text x="40" y="40" font-family="monospace" font-size="12" fill="#222">sample (Mixolydian): A B C# D E F# G</text>
        <text x="40" y="160" font-family="monospace" font-size="12" fill="#222">bass (Aeolian):     A B C  D E F  G</text>
        <!-- pitch class boxes -->
        <g font-family="monospace" font-size="14" text-anchor="middle">
          <rect x="60" y="55" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="85" y="82" fill="#fff">A</text>
          <rect x="120" y="55" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="145" y="82" fill="#fff">B</text>
          <rect x="180" y="55" width="50" height="40" fill="#c04a2a" stroke="#222"/><text x="205" y="82" fill="#fff">C#</text>
          <rect x="240" y="55" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="265" y="82" fill="#fff">D</text>
          <rect x="300" y="55" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="325" y="82" fill="#fff">E</text>
          <rect x="360" y="55" width="50" height="40" fill="#c04a2a" stroke="#222"/><text x="385" y="82" fill="#fff">F#</text>
          <rect x="420" y="55" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="445" y="82" fill="#fff">G</text>

          <rect x="60" y="175" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="85" y="202" fill="#fff">A</text>
          <rect x="120" y="175" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="145" y="202" fill="#fff">B</text>
          <rect x="180" y="175" width="50" height="40" fill="#c04a2a" stroke="#222"/><text x="205" y="202" fill="#fff">C</text>
          <rect x="240" y="175" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="265" y="202" fill="#fff">D</text>
          <rect x="300" y="175" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="325" y="202" fill="#fff">E</text>
          <rect x="360" y="175" width="50" height="40" fill="#c04a2a" stroke="#222"/><text x="385" y="202" fill="#fff">F</text>
          <rect x="420" y="175" width="50" height="40" fill="#3a7a4a" stroke="#222"/><text x="445" y="202" fill="#fff">G</text>
        </g>
        <text x="500" y="85" font-family="monospace" font-size="11" fill="#3a7a4a">green = shared (pivot)</text>
        <text x="500" y="200" font-family="monospace" font-size="11" fill="#c04a2a">red = non-shared (rub)</text>
        <text x="40" y="250" font-family="monospace" font-size="11" fill="#222">2 non-shared PCs = the rub. 0 = parallel. 3+ = mistake.</text>
      </svg>
    caption: "Two modes over A. Shared pitch classes are the pivot the ear hears as continuity; non-shared ones are the friction Bob Power named."
  references:
  - bib:charnas_dilla_time


needs_bib:
- title: Bob Power — 'the rub' — original interview or lecture source
  reason: The phrase 'the rub' as Bob Power's compositional term for sample-vs-track friction is widely repeated in D'Angelo/Roots engineering lore, but we do not yet have a primary-source citation (Tape Op, RBMA, or Sound on Sound). Treated as attributed-but-not-verified in the lesson; flag for the bibliography agent.
- title: Sounwave / Mark Spears on Kendrick Lamar beat-switch structure
  reason: We cite the Sounwave / DJ Dahi beat-switch move from Zak-Handbook §4.5, but want a direct Sounwave interview citation (e.g. Mass Appeal, RBMA, or Complex) to ground the TDE attribution.
- title: Burial (William Bevan) — 'Archangel' production notes
  reason: The 1:30 kick-removal moment in 'Archangel' is observable from the record, but a direct quote from Bevan about the choice is elusive. bib:burial_soundforge_quote covers the Soundforge line; a separate Archangel-specific source would be stronger.

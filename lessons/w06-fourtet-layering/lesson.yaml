# --- Expansion: technical diagrams ---
- id: d01
  kind: concept
  heading: Note Chance + Pitch Transformer wiring
  body_md: slides/d01-note-chance-wiring.md
  diagrams:
    - mermaid: |
        graph LR
          A[MIDI clip] --> B[Velocity Range ±15%]
          B --> C[note-on velocity randomized per trigger]
          A --> D[duplicate notes +12 semitones]
          D --> E{Chance 15%}
          E -->|fires| F[octave-up replacement]
          E -->|skips| G[original plays]
      caption: "Live 12 native primitives — Velocity Range + Note Chance — implement the Hebden 15/15 trick."
  song_refs:
  - song:fourtet_pager
- id: d02
  kind: concept
  heading: Skater doubling — one MIDI clip, three octave layers
  body_md: slides/d02-skater-doubling-diagram.md
  diagrams:
    - mermaid: |
        graph LR
          M[MIDI clip<br/>F minor bass walk] --> T1[Omnisphere Plectra Sub<br/>F1–F2, 0 dB]
          M --> T2[Same patch +24 semi<br/>F3–F4, −20 dB]
          M --> T3[Same patch +36 semi<br/>F4–F5, −24 dB, reverb]
          T1 --> G[group bus → brightness halo]
          T2 --> G
          T3 --> G
      caption: "No counter-melody. Same notes, three octaves. The halo reveals the fundamental on small speakers."
  song_refs:
  - song:fourtet_skater


- id: k02
  kind: concept
  heading: Kick-stack frequency bands — one layer per band
  body_md: slides/k02-kick-frequency-diagram.md
  diagrams:
    - svg_content: |
        <svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
          <rect width="800" height="360" fill="#f6f4ee"/>
          <text x="20" y="30" font-family="monospace" font-size="16" fill="#222">Kick-stack frequency bands (log-ish Hz, Zak estimate)</text>
          <g font-family="monospace" font-size="12" fill="#222">
            <text x="20" y="90">transient click</text>
            <rect x="180" y="72" width="480" height="24" fill="#c97a4a" opacity="0.85"/>
            <text x="670" y="90">3k–8k Hz</text>
            <text x="20" y="160">main kick</text>
            <rect x="90" y="142" width="360" height="24" fill="#5a7a8f" opacity="0.85"/>
            <text x="460" y="160">80–400 Hz body + 1–3k click</text>
            <text x="20" y="230">sub body</text>
            <rect x="60" y="212" width="180" height="24" fill="#3e5f3a" opacity="0.85"/>
            <text x="250" y="230">40–120 Hz</text>
            <text x="20" y="300">sub sine</text>
            <rect x="45" y="282" width="90" height="24" fill="#2a2a5a" opacity="0.85"/>
            <text x="145" y="300">30–60 Hz (F1)</text>
          </g>
          <line x1="180" y1="340" x2="780" y2="340" stroke="#222" stroke-width="1"/>
          <text x="180" y="356" font-family="monospace" font-size="10" fill="#222">20 Hz</text>
          <text x="760" y="356" font-family="monospace" font-size="10" fill="#222">20 kHz</text>
        </svg>
      caption: "Each layer chosen for its dominant band, not EQed into one. Inferred bands — flagged as estimate, not interview source."
  song_refs:
  - song:fourtet_daydream_repeat

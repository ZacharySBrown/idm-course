        graph TB
          subgraph Scheduler [Scheduler - 1ms resolution]
            A1[metro] --> A2[counter]
            A2 --> A3[message]
          end
          subgraph DSP [Signal Vector - 64 samples = 1.45ms]
            B1[cycle~] --> B2[*~]
            B2 --> B3[dac~]
          end
          A3 -.sig~.-> B1
          B3 -.snapshot~.-> A1
      caption: "Two clocks. Messages cross boundaries via sig~ (down) or snapshot~ (up)."

  gear_annotations:
    - src: assets/gear-monomachine-panel.jpg
      caption: "Monomachine SFX-60 MKII. Same sequencer grammar, different backend."
      callouts:
        - label: "SID / FM / WAVE / VO / DPRO / SuperWave"
          note: "Six machine types. FM is where the metallic Autechre bell timbres live."
        - label: "Per-track filter + delay + reverb send"
          note: "All p-lockable. Drops you into a Max-for-Live-adjacent routing model in hardware."

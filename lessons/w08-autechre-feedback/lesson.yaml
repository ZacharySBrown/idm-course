  deliverable: A 32-bar bounced audio file of evolving-but-rule-based drums, generated by the four-commit MIDI chain (Rhythm → Recombine Shuffle → Time Warp → Velocity Shaper → Ornament) applied to a Drum Rack loaded with the w08-moanin-ambient-feedback stemforge render.
- id: d01
  kind: concept
  heading: The four-commit chain, visualized
  body_md: slides/d01-four-commit-flow.md
  visuals: []
  audio_examples: []
  diagrams:
    - mermaid: |
        graph LR
          A[Empty MIDI clip] --> B[Rhythm generator<br/>16 steps, Density 55%]
          B -- commit --> C[Recombine Shuffle<br/>scramble, preserve content]
          C -- commit --> D[Time Warp<br/>2.0x → 0.25x curve]
          D -- commit --> E[Velocity Shaper<br/>hand-drawn curve]
          E -- commit --> F[Ornament<br/>1/64 flams, Density 20%]
          F --> G[Flattened MIDI]
      caption: "Each arrow labelled 'commit' is a literal Freeze+Flatten or apply-transform action. Five discrete decisions, not a macro."
- id: d02
  kind: concept
  heading: Procedural vs random — same generator, two runs
  body_md: slides/d02-procedural-vs-random.md
  visuals: []
  audio_examples: []
  diagrams:
    - mermaid: |
        graph TB
          subgraph Random
            R1[Generator] --> R2[Math.random seed]
            R2 --> R3[Render 1: hits @ 1,4,7,9,13]
            R2 --> R4[Render 2: hits @ 2,5,8,10,11,15]
          end
          subgraph Procedural
            P1[Generator] --> P2[Rule: LFO quantized]
            P2 --> P3[Render 1: hits @ 1,3,5,8,11,14]
            P2 --> P4[Render 2: hits @ 1,3,5,8,11,14]
          end
      caption: "Same generator; the difference is whether the modulator is stochastic or rule-based. Booth's constraint rejects the left column."

- id: gd-elektron-02
  kind: gear_deep_dive
  heading: Machinedrum tour — the five controls that matter
  body_md: slides/gd-elektron-02-tour-machinedrum.md
  visuals: []
  audio_examples: []
  gear_annotations:
    - src: assets/gear-machinedrum-panel.jpg
      caption: "Machinedrum front panel, p-lock workflow annotated."
      callouts:
        - label: "Trig keys"
          note: "16 step-pads. FUNC + trig arms a parameter lock on that step."
        - label: "Param encoders"
          note: "6 rows × 8 columns. Whatever you turn after arming a step is locked there."
        - label: "Machine selector"
          note: "TRX / EFM / E12 / P-I / GND — swap synthesis engine per track in one press."
        - label: "Kit bank"
          note: "64 kits per project. A kit is a machine-type + parameter snapshot set."
- id: gd-elektron-03
  kind: gear_deep_dive

needs_bib:
  - title: "NEU (1972) — Hallogallo session notes / Conny Plank tracking"
    reason: "Want a primary source for the single-take motorik drum bed on Hallogallo; currently only forum/retrospective consensus. Flagging for expander."
  - title: "Kanye West / Just Blaze — RBMA or interview on Re-Pitch chipmunk-soul workflow"
    reason: "Teaser to W9 currently leans on compass_artifact summary of the Just Blaze RBMA lecture; want a citeable transcript."
  - title: "Dorrough 610 Discriminate Audio Processor — manufacturer manual, circa 1980s"
    reason: "Originally Dorrough Electronics, Woodland Hills CA. Device marketed as a multiband processor for FM broadcast; primary source needed for threshold/ratio defaults and broadcast-chain positioning."
  - title: "Tarbox Road — tracking-chain diagram for Flaming Lips *Soft Bulletin* sessions (1999)"
    reason: "Fridmann-bass specifics (which mic, which pre, Dorrough in insert vs bus, Studer A80 printing) treated as Tarbox-internal lore. Compass-artifact and happymag summaries converge but no authoritative signal flow diagram."
  - title: "Flaming Lips engineering credits — Michael Ivins bass chain references"
    reason: "Want explicit confirmation that the distorted bass on *Soft Bulletin* (e.g., 'Race for the Prize') ran through the Dorrough insert rather than DI-plus-plugin."


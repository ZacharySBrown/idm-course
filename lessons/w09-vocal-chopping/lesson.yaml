  body_md: slides/gd-mpc3k-02-tour-pads.md
  gear_annotations:
  - src: assets/gear-mpc3000-panel.jpg
    caption: "MPC3000 front panel — the four controls that make Dilla time possible."
    callouts:
    - label: "16 pads"
      note: "Each pad is one voice with independent timing params."
    - label: "Swing %"
      note: "Per-pad, not global. Hats at 62%, kicks at 50%, snare at 50%."
    - label: "Note Repeat"
      note: "Hold pad + Note Repeat to fire at current subdivision. Hi-hat rolls without a piano roll."
    - label: "Timing Correct %"
      note: "Quantize strength. Dilla set this to 0 on most pads and nudged by ear."

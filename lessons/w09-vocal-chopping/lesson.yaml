needs_bib:
- title: Mike Dean interview on Auto-Tune retune-speed 0 (808s & Heartbreak / MBDTF)
  reason: Used as receipt for the retune-speed 0 talk-box trick; none of the current bib entries cite this directly.
- title: E-mu SP-1200 Operator's Manual / Service Manual (1987)
  reason: Used for the 12-bit companded PCM, 26.04 kHz sample rate, 2.5-second-per-pad RAM division, and no-anti-alias-filter input/output claims across the SP-1200 deep-dive. Currently asserted against the spec and producer interviews; no primary E-mu document is in bibliography.json.
- title: Dave Rossum / E-mu Systems interview on SP-1200 design decisions
  reason: The companded-ADC curve and deliberate sample-rate choice at 26.04 kHz are load-bearing claims. Dave Rossum has spoken about them in podcasts and trade mags; no single citable interview currently in bib.
- title: Pad Swing and MPC Groove (Max for Live) — author and current version
  reason: Named in gd-mpc3k-09 as MPC3000 per-pad-swing analogues. maxforlive.com hosts multiple devices with this name; no single canonical cite chosen yet.
- title: Mike Dean / Kanye West — SP-1200 routing on MBDTF sessions
  reason: gd-sp1200-10 flags the "ran modern DAW mix through a hardware SP-1200" claim as unconfirmed; needs a primary interview source or should be downgraded to rumor.
- title: Questlove — Dilla's Sloppy Precision (primary interview source)
  reason: bib:questlove_dilla_quote exists as a stub; the exact interview (magazine, podcast, or documentary) for the canonical quote should be locked down.

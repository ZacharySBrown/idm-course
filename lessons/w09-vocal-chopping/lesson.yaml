- id: gd-mpc3k-14
  kind: gear_deep_dive
  heading: "Diagram — Dilla swing visualized on the 96 PPQN grid"
  body_md: slides/gd-mpc3k-14-diagram-swing.md
  diagrams:
  - svg_content: |
      <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="800" height="300" fill="#f8f8f5"/>
        <text x="20" y="30" font-family="monospace" font-size="14" fill="#222">Dilla time at 90 BPM, 96 PPQN (1 tick = 6.94 ms)</text>
        <!-- 16th grid -->
        <g stroke="#ccc" stroke-width="1">
          <line x1="60" y1="60" x2="780" y2="60"/>
          <line x1="60" y1="120" x2="780" y2="120"/>
          <line x1="60" y1="180" x2="780" y2="180"/>
        </g>
        <!-- 16th tick marks -->
        <g stroke="#bbb" stroke-width="1">
          <line x1="60" y1="55" x2="60" y2="195"/>
          <line x1="105" y1="55" x2="105" y2="195"/>
          <line x1="150" y1="55" x2="150" y2="195"/>
          <line x1="195" y1="55" x2="195" y2="195"/>
          <line x1="240" y1="55" x2="240" y2="195"/>
          <line x1="285" y1="55" x2="285" y2="195"/>
          <line x1="330" y1="55" x2="330" y2="195"/>
          <line x1="375" y1="55" x2="375" y2="195"/>
          <line x1="420" y1="55" x2="420" y2="195"/>
          <line x1="465" y1="55" x2="465" y2="195"/>
          <line x1="510" y1="55" x2="510" y2="195"/>
          <line x1="555" y1="55" x2="555" y2="195"/>
          <line x1="600" y1="55" x2="600" y2="195"/>
          <line x1="645" y1="55" x2="645" y2="195"/>
          <line x1="690" y1="55" x2="690" y2="195"/>
          <line x1="735" y1="55" x2="735" y2="195"/>
        </g>
        <!-- HAT row label -->
        <text x="20" y="65" font-family="monospace" font-size="12" fill="#222">HAT</text>
        <!-- hats at 64% swing — every odd 16th pushed ~8 ticks -->
        <g fill="#3b6ea5">
          <circle cx="60" cy="60" r="6"/>
          <circle cx="119" cy="60" r="6"/>
          <circle cx="150" cy="60" r="6"/>
          <circle cx="209" cy="60" r="6"/>
          <circle cx="240" cy="60" r="6"/>
          <circle cx="299" cy="60" r="6"/>
          <circle cx="330" cy="60" r="6"/>
          <circle cx="389" cy="60" r="6"/>
        </g>
        <!-- SNARE row -->
        <text x="20" y="125" font-family="monospace" font-size="12" fill="#222">SNR</text>
        <!-- snares at beat 2 and 4, pulled 3 ticks early (-20 ms) -->
        <g fill="#b03030">
          <circle cx="177" cy="120" r="6"/>
          <circle cx="357" cy="120" r="6"/>
        </g>
        <line x1="180" y1="105" x2="180" y2="135" stroke="#b03030" stroke-dasharray="2,2"/>
        <line x1="360" y1="105" x2="360" y2="135" stroke="#b03030" stroke-dasharray="2,2"/>
        <text x="180" y="100" font-family="monospace" font-size="10" fill="#b03030" text-anchor="middle">grid</text>
        <!-- KICK row -->
        <text x="20" y="185" font-family="monospace" font-size="12" fill="#222">KCK</text>
        <!-- kicks: beat 1 +5ms, beat 3 -3ms -->
        <g fill="#2d7d46">
          <circle cx="65" cy="180" r="6"/>
          <circle cx="237" cy="180" r="6"/>
        </g>
        <line x1="60" y1="165" x2="60" y2="195" stroke="#2d7d46" stroke-dasharray="2,2"/>
        <line x1="240" y1="165" x2="240" y2="195" stroke="#2d7d46" stroke-dasharray="2,2"/>
        <text x="60" y="215" font-family="monospace" font-size="10" fill="#2d7d46" text-anchor="middle">+5ms</text>
        <text x="240" y="215" font-family="monospace" font-size="10" fill="#2d7d46" text-anchor="middle">-3ms</text>
        <!-- Legend -->
        <text x="20" y="255" font-family="monospace" font-size="11" fill="#444">hat = swing 64%   snr = -3 ticks (~-20 ms)   kck = ± few ms, inconsistent direction</text>
        <text x="20" y="275" font-family="monospace" font-size="11" fill="#666">rule: different offsets per pad, all in the same 4-bar pattern.</text>
      </svg>
    caption: "Dilla time on the 96 PPQN grid. Hats swung, snare pulled early, kicks drifting ±, all independently."

# ----- Gear deep-dive B: E-mu SP-1200 (RZA / Premier / Pete Rock / Kanye-era) -----
- id: gd-sp1200-01
  kind: gear_deep_dive
  heading: "E-mu SP-1200 — the grit machine"
  body_md: slides/gd-sp1200-01-title.md
  images:
  - src: assets/gear-sp1200-hero.jpg
    caption: "E-mu SP-1200, 1987. Designed by Dave Rossum. 12-bit proprietary companded PCM at 26.04 kHz, 2.5 s per pad, famously permissive anti-alias filter (gentle analog roll-off, not absent)."
    credit: "Photo: manufacturer / fair-use commentary"
    license: "fair-use commentary"
  references:
  - bib:charnas_dilla_time

- id: gd-sp1200-02
  kind: gear_deep_dive
  heading: "Annotated tour, 1/2 — sample rate, pitch, truncate"
  body_md: slides/gd-sp1200-02-tour-controls.md
  gear_annotations:
  - src: assets/gear-sp1200-panel.jpg
    caption: "SP-1200 front panel — the four controls that define the sound."
    callouts:
    - label: "SR 26.04 kHz"
      note: "Not user-adjustable. Nyquist at ~13 kHz. Everything above folds back."
    - label: "Pitch (semi + fine)"
      note: "Per-pad varispeed. Pitch-and-time coupled."
    - label: "Truncate"
      note: "Sample-level head/tail crop. 2.5 s per pad is a RAM division, not a setting."
    - label: "Individual outs"
      note: "Skip the stereo summing bus. Preserves more high-freq aliasing — the 'aliasing switch'."


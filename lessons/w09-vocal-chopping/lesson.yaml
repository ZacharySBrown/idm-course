- id: gd-sp1200-06
  kind: gear_deep_dive
  heading: "Underlying algorithm — 12-bit companded ADC"
  body_md: slides/gd-sp1200-06-algorithm-companding.md
  diagrams:
  - svg_content: |
      <svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="800" height="320" fill="#f8f8f5"/>
        <text x="20" y="30" font-family="monospace" font-size="14" fill="#222">Companded ADC curve — linear 12-bit vs SP-1200 proprietary (µ-law-like shape)</text>
        <!-- axes -->
        <g stroke="#888" stroke-width="1" fill="none">
          <line x1="80" y1="270" x2="760" y2="270"/>
          <line x1="80" y1="270" x2="80" y2="60"/>
        </g>
        <text x="400" y="300" font-family="monospace" font-size="11" fill="#444" text-anchor="middle">input amplitude (0 → full-scale)</text>
        <text x="40" y="170" font-family="monospace" font-size="11" fill="#444" transform="rotate(-90 40 170)">quantization level density</text>
        <!-- linear line (diagonal) -->
        <line x1="80" y1="270" x2="760" y2="60" stroke="#3b6ea5" stroke-width="2"/>
        <text x="560" y="100" font-family="monospace" font-size="11" fill="#3b6ea5">linear 12-bit (even)</text>
        <!-- companded curve (logarithmic-ish) -->
        <path d="M 80 270 Q 180 110 400 90 T 760 70" stroke="#b03030" stroke-width="2" fill="none"/>
        <text x="180" y="140" font-family="monospace" font-size="11" fill="#b03030">SP-1200 proprietary 12→8-bit (µ-law-like shape, not G.711)</text>
        <!-- labels -->
        <text x="100" y="260" font-family="monospace" font-size="10" fill="#222">dense near zero</text>
        <text x="600" y="80" font-family="monospace" font-size="10" fill="#222">sparse near full-scale</text>
        <text x="20" y="310" font-family="monospace" font-size="11" fill="#666">consequence: crunchy transient attacks, cleaner quiet tails. quantization noise is signal-dependent.</text>
      </svg>
    caption: "Companded ADC — dense quantization near zero, sparse near full-scale. The signature 'crunchy transient, clean tail' shape."
  references:
  - bib:roads_computer_music_tutorial

- id: gd-sp1200-07
  kind: gear_deep_dive
  heading: "Algorithm continued — aliasing and the 13 kHz cliff"
  body_md: slides/gd-sp1200-07-algorithm-aliasing.md
  diagrams:
  - svg_content: |
      <svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="800" height="320" fill="#f8f8f5"/>
        <text x="20" y="30" font-family="monospace" font-size="14" fill="#222">SP-1200 aliasing — 26.04 kHz, famously permissive AA filter (gentle ~1-pole from ~10 kHz)</text>
        <!-- axes -->
        <g stroke="#888" stroke-width="1" fill="none">
          <line x1="80" y1="260" x2="760" y2="260"/>
          <line x1="80" y1="260" x2="80" y2="60"/>
        </g>
        <text x="400" y="290" font-family="monospace" font-size="11" fill="#444" text-anchor="middle">frequency (kHz)</text>
        <text x="140" y="275" font-family="monospace" font-size="10" fill="#444">0</text>
        <text x="340" y="275" font-family="monospace" font-size="10" fill="#444">13 (Nyquist)</text>
        <text x="540" y="275" font-family="monospace" font-size="10" fill="#444">20</text>
        <text x="720" y="275" font-family="monospace" font-size="10" fill="#444">26</text>
        <!-- source flat to 20 kHz -->
        <line x1="80" y1="150" x2="540" y2="150" stroke="#3b6ea5" stroke-width="2"/>
        <line x1="540" y1="150" x2="540" y2="260" stroke="#3b6ea5" stroke-width="2"/>
        <text x="260" y="140" font-family="monospace" font-size="11" fill="#3b6ea5">source spectrum (flat to 20 kHz)</text>
        <!-- Nyquist cliff -->
        <line x1="340" y1="60" x2="340" y2="260" stroke="#b03030" stroke-width="1" stroke-dasharray="4,3"/>
        <!-- aliased ghost (mirror of source above Nyquist, folded back) -->
        <line x1="340" y1="200" x2="540" y2="200" stroke="#b03030" stroke-width="2" stroke-dasharray="5,3"/>
        <line x1="340" y1="200" x2="140" y2="200" stroke="#b03030" stroke-width="2" stroke-dasharray="5,3"/>
        <text x="220" y="215" font-family="monospace" font-size="11" fill="#b03030">folded aliasing</text>
        <!-- SP-1200 output = source + alias -->
        <text x="20" y="310" font-family="monospace" font-size="11" fill="#666">content above 13 kHz folds back into the audible band. permanently printed into the sample.</text>
      </svg>
    caption: "Aliasing cliff at 13 kHz. Any source content above Nyquist folds back as an inverted-image ghost, added to the sample."
  references:
  - bib:roads_computer_music_tutorial


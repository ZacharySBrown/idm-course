id: w01-listen-subtract
week: 1
title: "Week 1 — Listen like an engineer, subtract like a producer"
duration_minutes: 45
pillars: [meta_listening]
concepts:
  - reference_track_analysis
  - critical_listening_protocol
  - drop_one_stem
  - subtraction_method_preview
  - time_box_45min
  - session_mentalities
  - monitoring_environment
  - completion_over_perfection
ableton_surface:
  - arrangement_view
  - session_view
  - mute_solo
  - locators
  - reference_track_on_muted_audio_lane
  - bounce_in_place
prereqs: []

teasers: []

stemforge:
  recipes:
    - w01-benjamins-stems

references:
  - bib:sos_autechre_april_2004
  - bib:tape_op_89
  - bib:tape_notes_140_four_tet
  - bib:oblique_strategies_eno
  - bib:ableton_live_12_manual
  - bib:stemforge_repo
  - bib:song_exploder_porter_robinson

needs_bib:
  - title: "Berklee Online OMPRD-382 — Critical Listening syllabus"
    reason: "Cited in Spec B §6 for the level-matched 30-second A/B protocol; no public PDF currently archived in bibliography.json."
  - title: "Yamaha HS5 / Neumann KH80 / AKG K371 / Sennheiser HD600 monitoring comparison"
    reason: "Listening-environment sidebar pulls standard reference points; no consolidated source in bibliography.json. Zak specs manuals exist per-product but no umbrella entry."
  - title: "Rick Rubin — Perfection-by-subtraction quote"
    reason: "Spec A §5.9 cites the quote inline. Attribution likely The Creative Act (2023) — not in bibliography yet."
  - title: "Andrew Huang — half-decibel difference threshold quote"
    reason: "Spec A §6.1 attributes; source likely a YouTube essay. Not yet cataloged."


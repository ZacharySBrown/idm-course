  # ------------------------------------------------------------------
  # Image-anchored expansion slides (i01-i08)
  # ------------------------------------------------------------------

  - id: i01
    kind: reference
    heading: "Benjamins — the cover, briefly"
    body_md: slides/i01-benjamins-art.md
    images:
      - src: assets/benjamins-cover.jpg
        caption: "Benjamins, cover art. The reference track for the next twelve weeks."
        credit: "Album art — fair-use commentary"
        license: "fair-use commentary"

  - id: i02
    kind: concept
    heading: "The five axes, one pass at a time"
    body_md: slides/i02-five-axes.md
    images:
      - src: assets/five-axes-icons.svg
        caption: "Low-end, width, clarity, transient, reverb — five passes through the same 30-second chunk."
        credit: "Original diagram"
        license: "course-owned"

  - id: i03
    kind: concept
    heading: "Paper, not screen"
    body_md: slides/i03-paper-not-screen.md
    images:
      - src: assets/notebook-timer.jpg
        caption: "A paper notebook and a kitchen timer. The only two instruments this week."
        credit: "Stock photo"
        license: "stock-to-purchase"

  - id: d01
    kind: concept
    heading: "Where the four stems live"
    body_md: slides/d01-stem-frequencies.md
    diagrams:
      - svg_content: |
          <svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
            <style>
              .label { font: 14px sans-serif; fill: #222; }
              .axis  { stroke: #222; stroke-width: 1; fill: none; }
              .tick  { font: 11px sans-serif; fill: #555; }
              .bar-d { fill: #d35f5f; opacity: 0.75; }
              .bar-b { fill: #5f8cd3; opacity: 0.75; }
              .bar-v { fill: #67a867; opacity: 0.75; }
              .bar-o { fill: #c69a3f; opacity: 0.75; }
            </style>
            <text class="label" x="20" y="24">Stem occupancy (Hz, log)</text>
            <line class="axis" x1="80" y1="270" x2="760" y2="270" />
            <g class="tick">
              <text x="80"  y="290">20</text>
              <text x="195" y="290">100</text>
              <text x="310" y="290">500</text>
              <text x="425" y="290">1k</text>
              <text x="540" y="290">4k</text>
              <text x="655" y="290">10k</text>
              <text x="745" y="290">20k</text>
            </g>
            <rect class="bar-d" x="170" y="60"  width="490" height="30" />
            <text class="label" x="670" y="80">drums</text>
            <rect class="bar-b" x="165" y="105" width="205" height="30" />
            <text class="label" x="380" y="125">bass</text>
            <rect class="bar-v" x="255" y="150" width="345" height="30" />
            <text class="label" x="610" y="170">vocals</text>
            <rect class="bar-o" x="205" y="195" width="430" height="30" />
            <text class="label" x="645" y="215">other</text>
          </svg>
        caption: "Approximate frequency occupancy per stem. Ranges overlap; the separator classifies by more than frequency."
        credit: "Original diagram"
        license: "course-owned"

  - id: d02
    kind: concept
    heading: "The listening protocol, as a loop"
    body_md: slides/d02-listening-protocol.md
    diagrams:
      - mermaid: |
          graph LR
            A[Load reference + WIP<br/>adjacent tracks] --> B[Level-match<br/>LUFS short-term]
            B --> C[Chunk to 30s<br/>one axis per pass]
            C --> D[A/B switch]
            D --> E[Write one<br/>sentence]
            E --> C
        caption: "The Berklee critical-listening loop. Level-match first, chunk, switch, write — then repeat."

  - id: d03
    kind: concept
    heading: "Demucs, at arm's length"
    body_md: slides/d03-demucs-pipeline.md
    diagrams:
      - mermaid: |
          graph LR
            A[benjamins.wav<br/>stereo 44.1kHz] --> B[Demucs U-Net<br/>hybrid waveform+STFT]
            B --> C[drums.wav]
            B --> D[bass.wav]
            B --> E[vocals.wav]
            B --> F[other.wav]
        caption: "Simplified stemforge dispatch. The real U-Net has hundreds of layers; this is the block view."

  - id: i04
    kind: concept
    heading: "A spectrogram, in passing"
    body_md: slides/i04-spectrogram.md
    images:
      - src: assets/spectrogram-4stem.png
        caption: "Spectrogram view of Benjamins with the four stems stacked — time on x, frequency on y, amplitude as color."
        credit: "Generated from stemforge output"
        license: "course-owned"

  - id: i05
    kind: concept
    heading: "The densest bar is master state"
    body_md: slides/i05-densest-bar.md
    images:
      - src: assets/master-state-diagram.svg
        caption: "Arrangement as mute-automation over a single master state."
        credit: "Original diagram"
        license: "course-owned"

  - id: i06
    kind: reference
    heading: "Benjamins — find the master state"
    body_md: slides/i06-benjamins-as-example.md
    audio_examples:
      - type: ab
        label: "Benjamins chorus vs second verse — which one is master state?"
        a: build/audio/stemforge-renders/w01/benjamins_drums.wav
        b: build/audio/stemforge-renders/w01/benjamins_other.wav

  - id: i07
    kind: reference
    heading: "Tape Op and Sound on Sound"
    body_md: slides/i07-tape-op-sos.md
    images:
      - src: assets/tape-op-89-cover.jpg
        caption: "Tape Op #89 — Squarepusher cover story."
        credit: "Tape Op magazine — fair-use commentary"
        license: "fair-use commentary"
      - src: assets/sos-april-2004-cover.jpg
        caption: "Sound on Sound, April 2004 — Autechre feature."
        credit: "Sound on Sound magazine — fair-use commentary"
        license: "fair-use commentary"

  - id: i08
    kind: caveat
    heading: "The half-dB threshold (approximately)"
    body_md: slides/i08-huang-half-db.md
    images:
      - src: assets/level-match-meter.png
        caption: "A short-term LUFS meter matched within half a dB. The threshold where most listeners stop being able to tell."
        credit: "Screenshot"
        license: "screenshot-for-commentary"

  # ------------------------------------------------------------------
  # Listening-environment sidebar (le01-le06)
  # ------------------------------------------------------------------

  - id: le01
    kind: concept
    heading: "Listening environment — the sidebar"
    body_md: slides/le01-sidebar-open.md
    visuals: []

  - id: le02
    kind: reference
    heading: "Yamaha HS5 — the dull, honest near-field"
    body_md: slides/le02-hs5.md
    images:
      - src: assets/gear-yamaha-hs5.jpg
        caption: "Yamaha HS5 (2014). 5-inch near-field, 70 Hz-30 kHz."
        credit: "Yamaha product photography — fair-use commentary"
        license: "fair-use commentary"

  - id: le03
    kind: reference
    heading: "Neumann KH80 DSP — better, if the room deserves it"
    body_md: slides/le03-kh80.md
    images:
      - src: assets/gear-neumann-kh80.jpg
        caption: "Neumann KH80 DSP (2016). Onboard DSP, room correction via MA 1 mic."
        credit: "Neumann product photography — fair-use commentary"
        license: "fair-use commentary"

  - id: le04
    kind: reference
    heading: "AKG K371 + Sennheiser HD600 — the headphone A/B"
    body_md: slides/le04-k371-hd600.md
    images:
      - src: assets/gear-akg-k371.jpg
        caption: "AKG K371 (2019). Closed-back, Harman-target-adjacent."
        credit: "AKG product photography — fair-use commentary"
        license: "fair-use commentary"
      - src: assets/gear-sennheiser-hd600.jpg
        caption: "Sennheiser HD600 (1997). Open-back, 300 ohm, mid-forward."
        credit: "Sennheiser product photography — fair-use commentary"
        license: "fair-use commentary"

  - id: le05
    kind: concept
    heading: "Cross-reference, do not pick one"
    body_md: slides/le05-cross-reference.md
    visuals: []

  - id: le06
    kind: concept
    heading: "Room acoustics — first reflections and bass modes"
    body_md: slides/le06-room-acoustics.md
    diagrams:
      - svg_content: |
          <svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
            <style>
              .wall    { stroke: #222; stroke-width: 2; fill: none; }
              .speaker { fill: #444; }
              .head    { fill: #b44; }
              .direct  { stroke: #2a7; stroke-width: 2; fill: none; }
              .reflect { stroke: #a62; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
              .mode    { stroke: #55a; stroke-width: 1.5; stroke-dasharray: 2 4; fill: none; }
              .label   { font: 13px sans-serif; fill: #222; }
            </style>
            <rect class="wall" x="80" y="60" width="640" height="280" />
            <rect class="speaker" x="180" y="180" width="24" height="40" />
            <rect class="speaker" x="596" y="180" width="24" height="40" />
            <circle class="head" cx="400" cy="280" r="10" />
            <line class="direct" x1="200" y1="200" x2="400" y2="280" />
            <line class="direct" x1="608" y1="200" x2="400" y2="280" />
            <polyline class="reflect" points="200,200 90,150 400,280" />
            <polyline class="reflect" points="608,200 710,150 400,280" />
            <path class="mode" d="M 90,330 Q 400,320 710,330" />
            <path class="mode" d="M 90,330 Q 245,360 400,330 Q 555,300 710,330" />
            <text class="label" x="90"  y="52">Room boundary</text>
            <text class="label" x="180" y="175">L mon</text>
            <text class="label" x="596" y="175">R mon</text>
            <text class="label" x="380" y="305">listener</text>
            <text class="label" x="510" y="145">first reflection</text>
            <text class="label" x="510" y="380">bass mode (low-freq standing wave)</text>
          </svg>
        caption: "Top-down room. Solid green lines — direct sound. Dashed brown — first reflections off side walls. Dashed blue — the lowest bass mode between front and back walls."
        credit: "Original diagram"
        license: "course-owned"


  - id: gd-mpc2kxl-11
    kind: gear_deep_dive
    heading: "Parallel modern workflows — the method outlived the metal"
    body_md: slides/gd-mpc2kxl-11-modern-parallels.md
    visuals: []

  - id: gd-mpc2kxl-12

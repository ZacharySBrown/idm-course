  - id: gd-mpc2kxl-09
    kind: gear_deep_dive
    heading: "Parallel Max for Live devices"
    body_md: slides/gd-mpc2kxl-09-max-devices.md
    visuals: []

  - id: gd-mpc2kxl-10
    kind: gear_deep_dive
    heading: "Creative uses beyond chopping vocals"
    body_md: slides/gd-mpc2kxl-10-creative-uses.md

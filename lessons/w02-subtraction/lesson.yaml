needs_bib:
  - title: "Rick Rubin — 'Perfection is obtained when there's no longer anything to take away' (attribution)"
    reason: "Used as the Subtraction thesis quote. The specs cite Rubin paraphrasing Saint-Exupéry; we should back this with either The Creative Act (Rubin, 2023) or the original Saint-Exupéry Terre des Hommes (1939). Neither is currently in bibliography.json."
  - title: "Jack Conte — 'Finished is better than perfect' (Patreon / YouTube interview source)"
    reason: "Spec cites Conte via Rubin via unnamed producer; need a primary source. Likely Jack Conte's own YouTube uploads or Patreon blog circa 2015–2018."


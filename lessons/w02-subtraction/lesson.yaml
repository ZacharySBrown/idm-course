  - id: ar04
    kind: concept
    heading: "The six-minute locator template — density curve"
    body_md: slides/ar04-locator-template-diagram.md
    diagrams:
      - svg_content: |
          <svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" aria-label="Density curve over 6-minute Subtraction template">
            <rect x="0" y="0" width="800" height="280" fill="#f6f4ef"/>
            <!-- axes -->
            <line x1="60" y1="240" x2="760" y2="240" stroke="#222" stroke-width="1.5"/>
            <line x1="60" y1="40" x2="60" y2="240" stroke="#222" stroke-width="1.5"/>
            <text x="20" y="50" font-family="monospace" font-size="11" fill="#222">tracks</text>
            <text x="720" y="258" font-family="monospace" font-size="11" fill="#222">time</text>
            <!-- locator ticks + labels -->
            <g font-family="monospace" font-size="10" fill="#222">
              <line x1="60" y1="240" x2="60" y2="246" stroke="#222"/>
              <text x="44" y="262">0:00</text>
              <line x1="175" y1="240" x2="175" y2="246" stroke="#222"/>
              <text x="150" y="262">0:45</text>
              <line x1="310" y1="240" x2="310" y2="246" stroke="#222"/>
              <text x="290" y="262">2:00</text>
              <line x1="460" y1="240" x2="460" y2="246" stroke="#222"/>
              <text x="430" y="262">3:15</text>
              <line x1="520" y1="240" x2="520" y2="246" stroke="#222"/>
              <text x="498" y="262">3:45</text>
              <line x1="640" y1="240" x2="640" y2="246" stroke="#222"/>
              <text x="618" y="262">5:00</text>
              <line x1="740" y1="240" x2="740" y2="246" stroke="#222"/>
              <text x="716" y="262">5:45</text>
            </g>
            <!-- section labels -->
            <g font-family="monospace" font-size="11" fill="#555">
              <text x="95" y="32">Intro</text>
              <text x="225" y="32">A</text>
              <text x="375" y="32">B</text>
              <text x="470" y="32">Red.</text>
              <text x="555" y="32">Peak</text>
              <text x="665" y="32">Outro</text>
            </g>
            <!-- density curve -->
            <path d="M 60 210 L 175 180 L 310 130 L 460 215 L 475 220 L 490 150 L 520 60 L 640 170 L 740 225"
                  fill="none" stroke="#c04a2a" stroke-width="2.5" stroke-linejoin="round"/>
            <!-- one-bar silence marker -->
            <line x1="478" y1="232" x2="478" y2="70" stroke="#222" stroke-width="1" stroke-dasharray="3 3"/>
            <text x="404" y="80" font-family="monospace" font-size="10" fill="#222">one-bar silence</text>
            <!-- constant anchor baseline -->
            <line x1="60" y1="225" x2="740" y2="225" stroke="#3a7a4a" stroke-width="1" stroke-dasharray="2 4"/>
            <text x="610" y="220" font-family="monospace" font-size="10" fill="#3a7a4a">constant anchor</text>
          </svg>
        caption: "Density curve over the Subtraction template. Dip before Peak is what makes the Peak land. Dashed green: the constant anchor rides through."

  - id: ar05
    kind: concept
    heading: "Subtraction vs Bounce-and-Arrange vs Skeleton — side-by-side"
    body_md: slides/ar05-methods-comparison.md
    diagrams:
      - mermaid: |
          graph TD
            A[Dense 16-bar loop exists?] -->|Yes, I love it| S[Subtraction: mute backward from Peak]
            A -->|Yes, but too many takes| B[Bounce-and-Arrange: freeze stems then cut]
            A -->|No, loop is thin| K[Skeleton: build sparse first, add up]
            S --> Z[Finished 6-min arrangement]
            B --> Z
            K --> Z
        caption: "Three entry points, one output. The method follows the state of the loop, not the other way round."

  - id: ar06
    kind: concept
    heading: "Consolidate, Bounce in Place, Freeze, Bounce Group — which one, when"
    body_md: slides/ar06-consolidate-vs-bounce.md
    references:
      - bib:ableton_live_12_manual


- id: gd-qy700-02
  kind: gear_deep_dive
  heading: Annotated tour (1/2) — the step grid
  body_md: slides/gd-qy700-02-panel-grid.md
  gear_annotations:
  - src: assets/gear-qy700-panel-grid.jpg
    caption: Step grid + velocity editor highlighted
    callouts:
    - label: step grid
      note: One line per track. Pitches entered numerically, not via piano roll.
    - label: velocity ed
      note: Per-step velocity curves — hand-drawn, not groove-template.
    - label: pattern chain
      note: Up to 16 patterns chained into the arrangement.
    - label: part 1-16
      note: 16 AWM voices, each on its own MIDI channel.
- id: gd-qy700-03
  kind: gear_deep_dive
  heading: Annotated tour (2/2) — MIDI I/O and the chain

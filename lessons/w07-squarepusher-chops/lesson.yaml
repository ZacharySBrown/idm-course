needs_bib:
- title: Squarepusher — The Metallurgist sidechain quote (source)
  reason: 'The spec attributes the ''bass drum as sidechain source for all other instruments'' quote to Jenkinson but does not anchor the exact interview. Likely Tape Op #89 or a second magazine piece; flagged so the bib-expander can confirm primary source.'
- title: Squarepusher — Hello Everything / Kronecker King production notes
  reason: The 1–2ms transient-only snare (Kronecker-delta impulse) is documented on KVR and Jenkinson's own site notes; no single citable interview in bibliography.json yet.
- title: Mantronix — 'King Of The Beats' Amen-break provenance
  reason: Jenkinson's SOS comment that Mantronix was his first Amen exposure needs a direct SOS citation slot; not present in current bibliography.

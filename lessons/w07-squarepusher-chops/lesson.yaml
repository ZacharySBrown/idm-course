    caption: QY700 rear panel — MIDI Out A/B and sync
    callouts:
    - label: MIDI Out A
      note: Ch 1-16 — internal AWM + external FM synths (TX81Z, FS1R).
    - label: MIDI Out B
      note: Ch 1-16 — sampler bus (S950, later S6000).
    - label: sync out
      note: 24 PPQ clock to DR-660 and tape transport.

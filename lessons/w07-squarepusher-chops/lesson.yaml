- id: gd-s950-02
  kind: gear_deep_dive
  heading: Annotated tour (1/2) — S950 sample edit
  body_md: slides/gd-s950-02-panel-s950.md
  gear_annotations:
  - src: assets/gear-s950-panel.jpg
    caption: S950 front panel — edit controls
    callouts:
    - label: truncate
      note: Trim sample start/end by ear. Two-line LCD, no waveform view.
    - label: loop points
      note: Sustain loops for held-snare rolls on Hard Normal Daddy.
    - label: pitch shift
      note: Naive sample-rate conversion — aliases above ±2 semitones. That alias is the signature.
    - label: 8 outs
      note: Each chop to its own Mackie channel, parallel processing.
- id: gd-s950-03
  kind: gear_deep_dive
  heading: Annotated tour (2/2) — DR-660 pattern grid + sync
  body_md: slides/gd-s950-03-panel-dr660.md
  gear_annotations:
  - src: assets/gear-dr660-panel.jpg
    caption: Boss DR-660 front panel — pattern grid + sync/trigger
    callouts:
    - label: pattern grid
      note: Step mode or real-time tap-in. Jenkinson tap-in then 1/32 quantize.
    - label: MIDI out
      note: Each pad fires a note on configurable channel — routes to S950 in.
    - label: sync out
      note: 24 PPQ clock — slaves S950 LFOs and QY700 when present.
    - label: accent row
      note: Three velocity tiers. Ghost/loud switch, not nuance.

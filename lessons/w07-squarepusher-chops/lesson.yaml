      graph LR
        K[KICK trigger bus] --> S[Sub compressor: 6 dB]
        K --> P[Pad compressor: 3 dB]
        K --> L[Lead compressor: 1 dB]
        K --> V[Vox compressor: 2 dB]
        K --> N[Noise compressor: 4 dB]
        K --> M[Master Glue: 1 dB]
    caption: Fan-out sidechain graph — every bus receives the kick envelope. Mix composed by envelope, not just mixed.

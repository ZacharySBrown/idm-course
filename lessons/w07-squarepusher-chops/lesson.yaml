- id: gd-s950-06
  kind: gear_deep_dive
  heading: Underlying algorithm — 12-bit companded ADC at 7.5–40 kHz
  body_md: slides/gd-s950-06-algorithm.md
  diagrams:
  - mermaid: |
      graph LR
        A[Input audio] --> B[µ-law-style companding<br/>Akai/E-mu 12→8-bit proprietary]
        B --> C[12-bit linear quantize<br/>at 7.5–40 kHz user-selectable]
        C --> D[RAM]
        D --> E[Pitch = sample-rate conversion]
        E --> F[Aliasing above ±2 semitones]
        F --> G[Anti-alias LPF ~24 kHz, gentle slope]
        G --> H[Output]
    caption: 'S950 signal path. Companding + naive repitch = the grit, not the bit depth alone. Roads 1996 pp. 21-23.'

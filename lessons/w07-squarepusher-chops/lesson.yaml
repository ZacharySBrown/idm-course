- id: d02
  kind: concept
  heading: Half-speed tape bass — the diagram
  body_md: slides/d02-halfspeed-diagram.md
  diagrams:
  - mermaid: |
      graph TD
        A[Project tempo 160 BPM] --> B[Halve to 80 BPM]
        B --> C[Play bass one octave down, slowly]
        C --> D[Return tempo to 160 BPM]
        D --> E[Warp Complex Pro, Formants ON]
        E --> F[Pitch snaps up one octave, timing tightens]
    caption: Jenkinson's half-speed trick, Ableton equivalent flow. Error halves when tempo doubles.

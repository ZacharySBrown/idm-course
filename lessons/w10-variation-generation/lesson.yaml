  # ---------------------------------------------------------------------------
  # Diagram slides
  # ---------------------------------------------------------------------------

  - id: d01
    kind: concept
    heading: "Follow Actions — the state-machine diagram"
    body_md: slides/d01-follow-actions-state-machine.md
    diagrams:
      - mermaid: |
          graph LR
            A[Clip 1] -->|Play Again · 20| A
            A -->|Other · 80| B[Clip 2]
            A -->|Other · 80| C[Clip 3]
            B -->|Play Again · 20| B
            B -->|Other · 80| A
            B -->|Other · 80| C
            C -->|Play Again · 20| C
            C -->|Other · 80| A
            C -->|Other · 80| B
        caption: "Three-clip Follow Actions pool with Pattern 1 weights (20% self, 80% other). Every trigger interval Live rolls the edge weights and dispatches."
    references:
      - bib:ableton_live_12_manual
      - bib:sos_autechre_april_2004

  - id: d02
    kind: concept
    heading: "Resample-and-Mutate — the pipeline"
    body_md: slides/d02-resample-mutate-pipeline.md
    diagrams:
      - mermaid: |
          graph LR
            M1[MIDI: drums] --> RB[Resample bus]
            M2[MIDI: bass] --> RB
            M3[MIDI: pad] --> RB
            RB -->|Bounce Group 12.3| P[Printed audio]
            P -->|Delete source MIDI| X((commit))
            X --> CH[Chop · Simpler Slicing]
            CH --> MU[Mutate: pitch · reverse · crush · offset]
            MU --> BC[B and C section material]
        caption: "The one-way pipeline. Commitment boundary sits at 'Delete source MIDI' — no move back from this point. Live 12.3 Bounce Groups collapses the first three steps into one menu item."
    references:
      - bib:mr_bill_resample_tutorial
      - bib:ableton_live_12_manual

  - id: d03
    kind: concept
    heading: "The variation tree — one source × 5 mutations"
    body_md: slides/d03-variation-tree.md
    diagrams:
      - mermaid: |
          graph TD
            R[Source loop · 16 bars] --> V1[Mutation 1 · drum swap]
            R --> V2[Mutation 2 · bass seed]
            R --> V3[Mutation 3 · filter sweep]
            R --> V4[Mutation 4 · reverse one element]
            R --> V5[Mutation 5 · new layer]
            V1 --> S1[Section A]
            V2 --> S2[Section B]
            V3 --> S3[Intro / Reduction]
            V4 --> S4[Outro bridge]
            V5 --> S5[Peak]
        caption: "Five branches from one root. Leaves map to arrangement sections. Coherence is inherited from the shared root, not designed."
    references:
      - bib:finish_more_music_variation


  # --- Mastering deep-technique mini-module (mast-01 .. mast-08) ---

  - id: mast-01
    kind: concept
    heading: "LUFS explained — ITU BS.1770-4, K-weighting, gating"
    body_md: slides/mast-01-lufs-explained.md
    images:
      - src: assets/itu-bs1770-k-weighting.png
        caption: "K-weighting filter response — high-pass + high-shelf, approximating equal-loudness at 83 dB SPL."
        credit: "After ITU-R BS.1770-4, Annex 1"
        license: "fair-use technical illustration"

  - id: mast-02
    kind: concept
    heading: "The loudness scale — −14 LUFS, −9 LUFS, −1 dBTP on one diagram"
    body_md: slides/mast-02-lufs-scale-diagram.md
    diagrams:
      - svg_content: |
          <svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
            <style>
              .axis { stroke: #333; stroke-width: 1.5; }
              .tick { stroke: #333; stroke-width: 1; }
              .label { font: 13px sans-serif; fill: #222; }
              .hdr { font: 15px sans-serif; fill: #111; font-weight: 600; }
              .band { opacity: 0.25; }
              .note { font: 11px sans-serif; fill: #444; }
              .marker { font: 12px sans-serif; fill: #b00; font-weight: 600; }
            </style>
            <text x="40" y="30" class="hdr">LUFS (integrated) — perceptual loudness scale</text>
            <line x1="60" y1="80" x2="60" y2="340" class="axis" />
            <line x1="60" y1="340" x2="740" y2="340" class="axis" />
            <!-- scale tick marks from -24 to -6 LUFS -->
            <g>
              <line x1="60" y1="80" x2="55" y2="80" class="tick" /><text x="30" y="84" class="label">-6</text>
              <line x1="60" y1="120" x2="55" y2="120" class="tick" /><text x="24" y="124" class="label">-9</text>
              <line x1="60" y1="160" x2="55" y2="160" class="tick" /><text x="22" y="164" class="label">-11</text>
              <line x1="60" y1="200" x2="55" y2="200" class="tick" /><text x="22" y="204" class="label">-14</text>
              <line x1="60" y1="260" x2="55" y2="260" class="tick" /><text x="22" y="264" class="label">-18</text>
              <line x1="60" y1="320" x2="55" y2="320" class="tick" /><text x="22" y="324" class="label">-24</text>
            </g>
            <!-- streaming normalization band -14 -->
            <rect x="60" y="198" width="680" height="6" fill="#1a8917" />
            <text x="280" y="216" class="marker">−14 LUFS — Spotify / Apple Music integrated target</text>
            <!-- club band -9 to -11 -->
            <rect x="60" y="120" width="680" height="44" fill="#b88200" class="band" />
            <text x="280" y="146" class="marker">−9 to −11 LUFS — club / loud-listening master</text>
            <!-- quiet / classical -->
            <rect x="60" y="260" width="680" height="60" fill="#1a4e89" class="band" />
            <text x="280" y="298" class="note">−18 to −24 LUFS — orchestral / film-score / dynamic masters</text>
            <!-- dBTP note separate axis -->
            <text x="40" y="380" class="hdr">dBTP (separate axis — codec safety ceiling, NOT LUFS)</text>
            <text x="60" y="400" class="marker">−1.0 dBTP — streaming delivery ceiling (true-peak, 4× oversampled)</text>
          </svg>
        caption: "LUFS is perceptual-loudness. dBTP is reconstruction-peak. Different axes, both clamped on delivery."

  - id: mast-03
    kind: concept
    heading: "True peak vs sample peak — why −1.0 dBTP, not 0 dBFS"
    body_md: slides/mast-03-true-peak-math.md
    images:
      - src: assets/intersample-peak-reconstruction.png
        caption: "Samples below 0 dBFS; reconstructed analog wave rises above. The intersample peak is what the DAC produces."
        credit: "After Nielsen & Lund, AES 2003 / Pro-L 2 documentation"
        license: "fair-use technical illustration"

  - id: mast-04
    kind: concept
    heading: "The mastering chain — signal order, six stages"
    body_md: slides/mast-04-mastering-flowchart.md
    diagrams:
      - mermaid: |
          graph LR
            A[Mix bounce] --> B[Pre-master check + references]
            B --> C[Master EQ]
            C --> D[Master comp optional]
            D --> E[Limiter -1.0 dBTP]
            E --> F[Youlean + SPAN metering]
            F --> G[Export 24-bit / 44.1]
        caption: "Fixed order. EQ before limiter. Metering after limiter. Export last."

  - id: mast-05
    kind: concept
    heading: "A/B level-matched — close your eyes, then pick"
    body_md: slides/mast-05-ab-protocol-deep.md
    images:
      - src: assets/youlean-ab-levelmatched.png
        caption: "Three reference tracks + one mix, all gain-matched to the same integrated LUFS on Youlean."
        credit: "Screenshot — Youlean Loudness Meter 2 free tier"
        license: "fair-use product documentation"

  - id: mast-06
    kind: concept
    heading: "Translation matrix — four playback chains, four kinds of lying"
    body_md: slides/mast-06-reference-translation.md
    diagrams:
      - svg_content: |
          <svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg">
            <style>
              .hdr { font: 14px sans-serif; fill: #111; font-weight: 600; }
              .cell { font: 12px sans-serif; fill: #222; }
              .system { font: 13px sans-serif; fill: #111; font-weight: 600; }
              .grid { stroke: #999; stroke-width: 1; fill: none; }
              .row-alt { fill: #f4f4f4; }
            </style>
            <text x="20" y="24" class="hdr">Four playback chains — what each one tells you, what it lies about</text>
            <line x1="20" y1="40" x2="800" y2="40" class="grid" />
            <text x="30" y="60" class="system">System</text>
            <text x="220" y="60" class="system">Trust it for</text>
            <text x="520" y="60" class="system">Do NOT trust it for</text>
            <line x1="20" y1="70" x2="800" y2="70" class="grid" />
            <rect x="20" y="70" width="780" height="40" class="row-alt" />
            <text x="30" y="95" class="cell">Main monitors</text>
            <text x="220" y="95" class="cell">Stereo field, transients</text>
            <text x="520" y="95" class="cell">Low end (room-dependent)</text>
            <text x="30" y="135" class="cell">AKG K371 (closed)</text>
            <text x="220" y="135" class="cell">Bass translation, isolation</text>
            <text x="520" y="135" class="cell">Slight upper-mid recession</text>
            <rect x="20" y="150" width="780" height="40" class="row-alt" />
            <text x="30" y="175" class="cell">Sennheiser HD600 (open)</text>
            <text x="220" y="175" class="cell">Midrange honesty, vocals</text>
            <text x="520" y="175" class="cell">Sub below 50 Hz (absent)</text>
            <text x="30" y="215" class="cell">Phone speaker</text>
            <text x="220" y="215" class="cell">Midrange balance, reality</text>
            <text x="520" y="215" class="cell">Anything below 200 Hz (gone)</text>
            <rect x="20" y="230" width="780" height="40" class="row-alt" />
            <text x="30" y="255" class="cell">Car system</text>
            <text x="220" y="255" class="cell">Sub-bass reality check</text>
            <text x="520" y="255" class="cell">Cabin adds 6-8 dB sub resonance</text>
          </svg>
        caption: "Each chain's bias is known. Use them in combination, not in isolation."

  - id: mast-07
    kind: caveat
    heading: "Self-master vs send to engineer — the decision tree"
    body_md: slides/mast-07-when-to-send-out.md

  - id: mast-08
    kind: concept
    heading: "Reading Youlean + SPAN — the five-second glance"
    body_md: slides/mast-08-metering-workflow-screenshot.md
    images:
      - src: assets/youlean-span-master-chain.png
        caption: "Youlean integrated + short-term + true-peak on the left; SPAN long-time spectrum on the right."
        credit: "Screenshot — Youlean Loudness Meter 2 + Voxengo SPAN, both free tier"
        license: "fair-use product documentation"

  # --- Release delivery mini-module (rel-01 .. rel-04) ---

  - id: rel-01
    kind: concept
    heading: "Bandcamp upload — six fields that matter for the private EP"
    body_md: slides/rel-01-bandcamp-upload.md
    images:
      - src: assets/bandcamp-upload-dialog.png
        caption: "Bandcamp artist-page upload form — album title, privacy toggle, artwork, track files."
        credit: "Screenshot — Bandcamp artist dashboard"
        license: "fair-use platform documentation"

  - id: rel-02
    kind: concept
    heading: "SoundCloud vs DistroKid vs TuneCore — route by the job"
    body_md: slides/rel-02-soundcloud-vs-distrokid.md
    diagrams:
      - mermaid: |
          graph TD
            A[Finished master] --> B{Release shape?}
            B -->|private, 1 friend| C[Bandcamp private]
            B -->|public single, preview| D[SoundCloud]
            B -->|EP / album, volume| E[DistroKid subscription]
            B -->|one release per year| F[TuneCore per-release]
            E --> G[Spotify / Apple / Tidal / ~150 DSPs]
            F --> G
        caption: "Route by release shape, not hype. Bandcamp this week; DistroKid for Year Two volume."

  - id: rel-03
    kind: concept
    heading: "File versioning — `v01_mixprint` saves you in eighteen months"
    body_md: slides/rel-03-file-versioning.md

  - id: rel-04
    kind: concept
    heading: "Metadata hygiene — composer, BPM, key, ISRC, the boring list"
    body_md: slides/rel-04-metadata-hygiene-deep.md

  # --- Voice-consistency mini-module (voice-01 .. voice-02) ---

  - id: voice-01

  - id: bernd-01
    kind: teaser
    heading: "Bernd says — the classical mastering mind"
    body_md: slides/bernd-01-gottinger-intro.md
    images:
      - src: assets/gottinger-mastering-studio.jpg
        caption: "Bernd Gottinger at the SUNY Fredonia mastering lab; GRAMMY-nominated Buffalo Philharmonic credits."
        credit: "SUNY Fredonia press / fair-use editorial"

needs_bib:
  - title: "Youlean Loudness Meter 2 — documentation / LUFS target presets"
    reason: "Primary free LUFS meter recommended this week. No current bib entry; needed for a direct receipt in slide s02."
  - title: "SPAN (Voxengo) — free spectrum analyzer documentation"
    reason: "Recommended alongside Youlean for the metering pair. No bib entry."
  - title: "Spotify Loudness Normalization — official target documentation"
    reason: "The −14 LUFS integrated claim needs the Spotify engineering post as its receipt, not a forum paraphrase."
  - title: "Apple Music — Sound Check / loudness normalization specification"
    reason: "Same issue on the Apple side. Currently forum-sourced; needs a first-party page."
  - title: "AES Recommendation BS.1770-4 — ITU loudness measurement"
    reason: "The standard under every LUFS meter. Cite-only; useful for students who want the spec."
  - title: "Bandcamp — artist upload specification (file format, artwork, metadata)"
    reason: "Primary distribution path for the finale exercise. No bib entry for the spec page."
  - title: "DistroKid / TuneCore — artist agreement pages"
    reason: "For the self-distribution vs Bandcamp-first comparison. Link-only bib entries."
  - title: "AKG K371 and Sennheiser HD600 — measured frequency response"
    reason: "Headphone translation reference. Measured response (Crinacle / oratory1990) is the honest citation, not marketing copy."
  - title: "Dave Fridmann — 'if it's not finished, it's not mastered' interview attribution"
    reason: "Quote is widely repeated in producer communities and aligns with Fridmann's public philosophy, but I could not find the verbatim source in either spec or the bibliography. Flagging as community-paraphrased in the lesson and citing davefridmann.com as the archive landing page only."
  - title: "ISRC code — official allocation documentation (US: RIAA ISRC agency)"
    reason: "The student will be asked to register their own ISRCs through a distributor; a link-only bib entry would help."

